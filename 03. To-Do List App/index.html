<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO List App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">


        <section class="header">
            <h1>To Do List App</h1>
            <p>Save Your To Do's</p>
        </section>

        <section class="todo">
            <form action="">
                <input type="text" placeholder="enter your to do" id="todoinput">
                <br><button class="btn">Save</button>
            </form>
            <div class="todos">
                <ol class="list">
                </ol>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>

</html>
