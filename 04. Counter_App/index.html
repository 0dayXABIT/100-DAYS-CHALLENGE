<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="counter-container">
        <header>
            <h1>Counter</h1>
        </header>

        <section class="display-section">
            <span id="count-value">0</span>
        </section>

        <section class="controls">
            <button id="add" class="btn" aria-label="Increase count">+</button>
            <button id="remove" class="btn" aria-label="Decrease count">−</button>
            <button id="reset" class="btn" aria-label="Reset count">Reset</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
